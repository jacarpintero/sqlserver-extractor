version: "3.9"

services:
  etl-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: etl-pipeline-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
      # Volumen ../logs -> /app/logs: el ETL escribe aquí para verlo en el host
      - ETL_LOG_FILE=/app/logs/etl_load.log
    volumes:
      - ../logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
